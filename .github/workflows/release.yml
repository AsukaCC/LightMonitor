name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names
  IMAGE_NAME: asukacc/lightmonitor

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_agent: lightmonitor-agent-linux-x86_64
            asset_server: lightmonitor-server-linux-x86_64
            asset_bundle: lightmonitor-app-linux-x86_64.tar.gz
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_agent: lightmonitor-agent-linux-aarch64
            asset_server: lightmonitor-server-linux-aarch64
            asset_bundle: lightmonitor-app-linux-aarch64.tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_agent: lightmonitor-agent-windows-x86_64.exe
            asset_server: lightmonitor-server-windows-x86_64.exe
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web (managed Linux bundle)
        if: runner.os == 'Linux'
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binaries (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          cargo build --release --workspace --target ${{ matrix.target }}
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/agent.exe" "dist/${{ matrix.asset_agent }}"
            cp "target/${{ matrix.target }}/release/server.exe" "dist/${{ matrix.asset_server }}"
          else
            cp "target/${{ matrix.target }}/release/agent" "dist/${{ matrix.asset_agent }}"
            cp "target/${{ matrix.target }}/release/server" "dist/${{ matrix.asset_server }}"
            chmod +x "dist/${{ matrix.asset_agent }}" "dist/${{ matrix.asset_server }}"
          fi

      - name: Build binaries (cross)
        if: matrix.cross
        run: |
          cross build --release --workspace --target ${{ matrix.target }}
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/agent" "dist/${{ matrix.asset_agent }}"
          cp "target/${{ matrix.target }}/release/server" "dist/${{ matrix.asset_server }}"
          chmod +x "dist/${{ matrix.asset_agent }}" "dist/${{ matrix.asset_server }}"

      - name: Package managed application
        if: runner.os == 'Linux'
        shell: bash
        run: |
          rm -rf app-bundle
          mkdir -p app-bundle/web
          cp "dist/${{ matrix.asset_server }}" app-bundle/lightmonitor-server
          cp -R web/dist/. app-bundle/web/
          printf '%s\n' "${GITHUB_REF_NAME#v}" > app-bundle/VERSION
          tar -czf "dist/${{ matrix.asset_bundle }}" -C app-bundle .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LIGHTMONITOR_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bins-*
          merge-multiple: true

      - name: List assets
        run: ls -lah artifacts

      - name: Create checksums
        working-directory: artifacts
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            ## 安装

            ### Docker
            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            ```

            版本标签会去掉 Git tag 的 `v` 前缀，例如 `v1.0.0` 对应镜像标签 `1.0.0`。

            ### Agent 一键安装
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install-agent.sh | \
              sudo bash -s -- --server-url https://your-server --token YOUR_AGENT_TOKEN
            ```

            镜像: `ghcr.io/${{ env.IMAGE_NAME }}`
